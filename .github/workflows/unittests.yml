name: CI Pipeline

on:
  push:
    branches: [ main, setup-task ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Display Python version
      run: python --version
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: List installed packages
      run: pip list
    
    - name: Check Python syntax errors
      run: |
        python -m py_compile src/*.py 2>/dev/null || true
        python -m py_compile tests/*.py 2>/dev/null || true
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v
    
    - name: Check code formatting with black
      run: |
        pip install black
        black --check src/ tests/ --diff
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 src/ tests/ --max-line-length=88 --ignore=E203,W503
    
    - name: Verify imports
      run: |
        python -c "import pandas; print(f'✅ Pandas {pandas.__version__}')"
        python -c "import numpy; print(f'✅ NumPy {numpy.__version__}')"
        python -c "import matplotlib; print(f'✅ Matplotlib {matplotlib.__version__}')"
    
    - name: Run security check on dependencies
      run: |
        pip install safety
        safety check
    
    - name: Generate dependency graph
      run: |
        pip install pipdeptree
        pipdeptree
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: |
          .pytest_cache/
          *.log